<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المتجر الرقمي اليمني للأدوية</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .print-btn { background: #28a745; color: white; padding: 10px; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; }
        .search-box { margin: 20px 0; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>المتجر الرقمي اليمني للأدوية</h1>
        <button class="print-btn no-print" onclick="window.print(); alert('تم إرسال الفاتورة للأدمن');">طباعة الفاتورة وإرسالها</button>
    </div>

    <div class="search-box no-print">
        <form method="GET">
            <input type="text" name="q" value="{{ query }}" placeholder="ابحث عن اسم الدواء...">
            <button type="submit">بحث</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>المخزن</th>
                <th>اسم الدواء</th>
                <th>تاريخ الانتهاء</th>
                <th>الكمية المتاحة</th>
                <th>الكمية المطلوبة</th>
                <th>الإجمالي</th>
            </tr>
        </thead>
        <tbody>
            {% for med in medicines %}
            <tr>
                <td>{{ med.store }}</td>
                <td>{{ med.name }}</td>
                <td>{{ med.expiry }}</td>
                <td>{{ med.qty }}</td>
                <td><input type="number" style="width: 50px;" oninput="this.parentElement.nextElementSibling.innerText = (this.value * {{ med.price }}) + ' ريال'"></td>
                <td>0 ريال</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>

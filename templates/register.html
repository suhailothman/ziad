<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تسجيل صيدلية جديدة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .reg-container { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="reg-container">
        <h2>تسجيل حساب صيدلية</h2>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="pharmacy_name" placeholder="اسم الصيدلية" required>
            <input type="text" name="location" placeholder="موقع الصيدلية (المحافظة/الشارع)" required>
            <input type="text" name="manager_phone" placeholder="رقم مدير المشتريات" required>
            <input type="email" name="email" placeholder="البريد الإلكتروني أو الهاتف" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit">إنشاء الحساب وبدء الطلب</button>
        </form>
        <p>لديك حساب؟ <a href="{% url 'login' %}">سجل دخولك هنا</a></p>
    </div>
</body>
</html>
